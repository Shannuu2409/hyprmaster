# /* ---- Full keybinds: your apps + every script (Shift/Alt/Ctrl) ---- */
$mainMod = SUPER

gestures {
    gesture = 3, horizontal, workspace
}


# App variables (edit these to match your apps)
$terminal = kitty
$browser = brave
$notes = notion-app
$menu = rofi -show drun
$fileManager = thunar

$scriptsDir = $HOME/.config/hypr/scripts
$configs = $HOME/.config/hypr/configs
$UserConfigs = $HOME/.config/hypr/UserConfigs
$UserScripts = $HOME/.config/hypr/UserScripts
$wallDIR = $HOME/Downloads/Wallpapers

# ============================================
# APPLICATIONS (your keys)
# ============================================
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, O, exec, $notes
bind = $mainMod, Space, exec, $menu
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, S, exec, Spotify
bind = $mainMod, W, exec, wasistlos
bind = $mainMod, Y, exec, brave --app=https://www.youtube.com
bind = $mainMod, X, exec, killall waybar || waybar

# ============================================
# SYSTEM & LOCK / POWER
# ============================================
bind = CTRL ALT, Delete, exec, hyprctl dispatch exit 0
bind = CTRL ALT, L, exec, $scriptsDir/LockScreen.sh
bind = CTRL ALT, P, exec, $scriptsDir/Wlogout.sh

# ============================================
# SCREENSHOTS (grimblast + script fallbacks)
# ============================================
bind = $mainMod, Print, exec, grimblast save screen ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png
bind = $mainMod SHIFT, S, exec, grimblast copy area
bind = $mainMod SHIFT, P, exec, grimblast save screen
bind = $mainMod SHIFT, C, exec, hyprpicker -a
bind = ALT, Print, exec, $scriptsDir/ScreenShot.sh --active
bind = $mainMod CTRL, Print, exec, $scriptsDir/ScreenShot.sh --in5
bind = $mainMod CTRL SHIFT, Print, exec, $scriptsDir/ScreenShot.sh --in10
bind = $mainMod ALT SHIFT, S, exec, $scriptsDir/ScreenShot.sh --swappy

# ============================================
# WINDOW MANAGEMENT
# ============================================
bind = $mainMod, C, killactive
bind = $mainMod, Q, killactive
bind = $mainMod, M, exit
bind = $mainMod, P, pseudo
bind = $mainMod, T, togglesplit
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod, V, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 900 600 && hyprctl dispatch centerwindow
bind = $mainMod ALT, F, exec, hyprctl dispatch workspaceopt allfloat
bind = $mainMod SHIFT, Q, exec, $scriptsDir/KillActiveProcess.sh
bind = $mainMod ALT, O, exec, hyprctl setprop active opaque toggle

# ============================================
# SCRIPTS – Waybar / Bar
# ============================================
bind = $mainMod CTRL, B, exec, $scriptsDir/WaybarStyles.sh
bind = $mainMod ALT, B, exec, $scriptsDir/WaybarLayout.sh
bind = $mainMod CTRL, C, exec, $scriptsDir/WaybarCava.sh

# ============================================
# SCRIPTS – Theme / Refresh / Rofi
# ============================================
bind = $mainMod ALT, H, exec, $scriptsDir/KeyHints.sh
bind = $mainMod ALT, R, exec, $scriptsDir/Refresh.sh
bind = $mainMod ALT, E, exec, $scriptsDir/RofiEmoji.sh
bind = $mainMod ALT, S, exec, $scriptsDir/RofiSearch.sh
bind = $mainMod SHIFT, B, exec, $scriptsDir/ChangeBlur.sh
bind = $mainMod SHIFT, G, exec, $scriptsDir/GameMode.sh
bind = $mainMod ALT, L, exec, $scriptsDir/ChangeLayout.sh
bind = CTRL ALT, V, exec, $scriptsDir/ClipManager.sh
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod ALT, D, exec, $scriptsDir/DarkLight.sh
bind = $mainMod, A, exec, ags -t 'overview'

# ============================================
# SCRIPTS – UserScripts (wallpaper, quick edit, etc.)
# ============================================
bind = $mainMod, E, exec, $UserScripts/QuickEdit.sh
bind = $mainMod SHIFT, M, exec, $UserScripts/RofiBeats.sh
bind = $mainMod ALT, W, exec, $UserScripts/WallpaperSelect.sh
bind = $mainMod SHIFT, W, exec, $UserScripts/WallpaperEffects.sh
bind = CTRL ALT, W, exec, $UserScripts/WallpaperRandom.sh
bind = CTRL ALT, A, exec, sh -c '$UserScripts/WallpaperAutoChange.sh $wallDIR &'
bind = $mainMod SHIFT, O, exec, $UserScripts/ZshChangeTheme.sh
bind = $mainMod SHIFT, I, exec, $UserScripts/mpd.sh
bind = ALT, Space, exec, $UserScripts/movie.sh
bind = $mainMod ALT, C, exec, $UserScripts/RofiCalc.sh
bind = $mainMod SHIFT, T, exec, $UserScripts/Weather.sh
bind = $mainMod ALT, I, exec, $UserScripts/battery-status.sh
bind = $mainMod SHIFT, R, exec, $UserScripts/recorder.sh

# ============================================
# FOCUS (VIM-STYLE + ARROWS)
# ============================================
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ============================================
# WINDOW MOVE / RESIZE (SHIFT = swap, resize)
# ============================================
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d
binde = $mainMod CTRL, left, resizeactive, -50 0
binde = $mainMod CTRL, right, resizeactive, 50 0
binde = $mainMod CTRL, up, resizeactive, 0 -50
binde = $mainMod CTRL, down, resizeactive, 0 50

# Resize submap (Super+R then H/J/K/L or arrows)
bind = $mainMod, R, submap, resize
submap = resize
binde = , H, resizeactive, -40 0
binde = , L, resizeactive, 40 0
binde = , K, resizeactive, 0 -40
binde = , J, resizeactive, 0 40
binde = , left, resizeactive, -40 0
binde = , right, resizeactive, 40 0
binde = , up, resizeactive, 0 -40
binde = , down, resizeactive, 0 40
bind = , escape, submap, reset
bind = , Return, submap, reset
submap = reset

# Move window (Super+Ctrl + arrows)
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

# ============================================
# MASTER LAYOUT (optional)
# ============================================
bind = $mainMod CTRL, D, layoutmsg, removemaster
bind = $mainMod, I, layoutmsg, addmaster
bind = $mainMod, U, togglespecialworkspace
bind = $mainMod SHIFT, U, movetoworkspace, special
bind = $mainMod CTRL, Return, layoutmsg, swapwithmaster
bind = $mainMod, G, togglegroup
bind = $mainMod CTRL, tab, changegroupactive
bind = ALT, tab, cyclenext
bind = ALT, tab, bringactivetotop

# ============================================
# WORKSPACES 1–10
# ============================================
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod, grave, togglespecialworkspace, magic
bind = $mainMod SHIFT, grave, movetoworkspace, special:magic
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, period, workspace, e+1
bind = $mainMod, comma, workspace, e-1

# ============================================
# MOUSE
# ============================================
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ============================================
# HARDWARE (MEDIA & BRIGHTNESS)
# ============================================
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
bindl = , XF86Sleep, exec, systemctl suspend
bindl = , XF86Rfkill, exec, $scriptsDir/AirplaneMode.sh

# Laptop (optional – uncomment in Laptops.conf if you use Brightness.sh/TouchPad)
# bindel = , XF86MonBrightnessUp, exec, $scriptsDir/Brightness.sh --inc
# bindel = , XF86MonBrightnessDown, exec, $scriptsDir/Brightness.sh --dec
# bind = , XF86TouchpadToggle, exec, $scriptsDir/TouchPad.sh

