# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  ##
# User Settings
# This is where you put your own settings as this will not be touched during update

# refer to Hyprland wiki for more info https://wiki.hyprland.org/Configuring/Variables

# Sourcing colors generated by pywal / wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
    force_split = 0
    special_scale_factor = 0.8
    split_width_multiplier = 1.0
    use_active_for_splits = true
}

master {
    new_status = master
    new_on_top = false
    mfact = 0.55
    smart_resizing = true
    drop_at_cursor = true
}

general {
  gaps_in = 4
  gaps_out = 6
  border_size = 2
  resize_on_border = true
  # Gradient border using wallpaper colors
  col.active_border = $color12 $color5 45deg
  col.inactive_border = $background
  layout = dwindle
}

group {
  col.border_active = $color12

  groupbar {
    col.active = $color0
  }
}

decoration {
    rounding = 15

    blur {
        enabled = true
        size = 18
        passes = 4
        new_optimizations = true
        ignore_opacity = false
        xray = false
        noise = 0.4
        contrast = 0.9
        brightness = 0.3
        # Vibrancy tints blur with wallpaper colors
        vibrancy = 0.15
        vibrancy_darkness = 0.4
        special = true
        popups = true
        popups_ignorealpha = 0.3
    }

    active_opacity = 0.85
    inactive_opacity = 0.75
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 40
        render_power = 5
        # Shadow colors from wallpaper (via wallust)
        color = $shadow_color
        color_inactive = $shadow_color_inactive
        offset = 0 0
        scale = 1.0
    }

    dim_inactive = true
    dim_strength = 0.15
    dim_special = 0.3
    dim_around = 0.5
}

$interval = 6.9
$curve = easeOut

animations {
  enabled = yes

  # bezier=NAME,X0,Y0,X1,Y1
  bezier = default, 0, 1, 0, 1
  bezier = wind, 0.05, 0.69, 0.1, 1
  bezier = winIn, 0.1, 1.1, 0.1, 1
  bezier = winOut, 0.3, 1, 0, 1
  bezier = linear, 1, 1, 1, 1
  bezier = easeOut, 0.16, 1, 0.3, 1

  # animation=NAME,ONOFF,SPEED,CURVE,STYLE
  animation = windows, 1, $interval, $curve, slide
  animation = windowsIn, 1, $interval, $curve, popin 90%
  animation = windowsOut, 1, $interval, $curve, popin 80%
  animation = windowsMove, 1, $interval, $curve, slide
  animation = fade, 1, 10, default
  animation = workspaces, 1, 10, $curve, slide
  animation = layers, 1, 6.9, $curve, slide
}

input {
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options = grp:alt_shift_toggle
  kb_rules =

  repeat_rate = 50
  repeat_delay = 300

  numlock_by_default = true
  left_handed = false
  follow_mouse = true
  float_switch_override_focus = false

  sensitivity = 0.5

  touchpad {
    disable_while_typing = 1
    natural_scroll = 1
    clickfinger_behavior = 0
    middle_button_emulation = 1
    tap-to-click = 1
    drag_lock = 0
  }
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  vfr = true
  mouse_move_enables_dpms = true
  enable_swallow = true
  swallow_regex = ^(kitty)$
  focus_on_activate = true
  initial_workspace_tracking = 0
  middle_click_paste = true
}

binds {
  workspace_back_and_forth = 1
  allow_workspace_cycles = 1
  pass_mouse_when_bound = 0
}

xwayland {
    force_zero_scaling = true
}

# Blur rules for layers
blurls = waybar
blurls = rofi

cursor {
  no_hardware_cursors = false
  enable_hyprcursor = true
  warp_on_change_workspace = true
  no_warps = false
}
